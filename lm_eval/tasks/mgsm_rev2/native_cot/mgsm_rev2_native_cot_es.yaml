dataset_name: es
doc_to_target: '{{answer_number|string}}'
doc_to_text: "Resuelve este problema matemático. Proporciona los pasos de razonamiento antes de dar la respuesta final en la última línea por sí misma en el formato de \"Respuesta:\". No añadas nada más que la respuesta entera después de \"Respuesta:\".\n{{question}}"
filter_list:
- filter:
  - function: regex
    regex_pattern: 'Respuesta:\s*(\-?[0-9\.\,]+)'
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: '(\-?[0-9\.\,]+)'
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Pregunta:'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_es
