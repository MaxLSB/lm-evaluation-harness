dataset_name: es
doc_to_target: '{{answer_number|string}}'
doc_to_text: "{{question}}\nPor favor, razona paso a paso y coloca tu respuesta final dentro de \\boxed{}."
filter_list:
- filter:
  - function: regex
    regex_pattern: La respuesta es (\-?[0-9\.\,]+)
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: "\\\\boxed\\{(\\-?[0-9\\.,]+)\\}"
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Pregunta:'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_es
