dataset_name: de
doc_to_target: '{{answer_number|string}}'
doc_to_text: "{{question}}\nBitte denken Sie Schritt für Schritt und geben Sie Ihre endgültige Antwort in \\boxed{} an."
filter_list:
- filter:
  - function: regex
    regex_pattern: Die Antwort lautet (\-?[0-9\.\,]+)
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: "\\\\boxed\\{(\\-?[0-9\\.,]+)\\}"
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Frage:'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_de
