dataset_name: de
doc_to_target: '{{answer_number|string}}'
doc_to_text: '{{"Frage: "+question+"\nSchritt-für-Schritt-Antwort:"}}'
filter_list:
- filter:
  - function: regex
    regex_pattern: Die Antwort lautet (\-?[0-9\.\,]+)
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: (-?[$0-9.,]{2,})|(-?[0-9]+)
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Frage:'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_de
