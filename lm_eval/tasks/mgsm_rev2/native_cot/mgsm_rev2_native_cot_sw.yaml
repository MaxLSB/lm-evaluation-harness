dataset_name: sw
doc_to_target: '{{answer_number|string}}'
doc_to_text: "Suluhisha tatizo hili la hesabu. Toa hatua za mantiki kabla ya kutoa jibu la mwisho kwenye mstari wa mwisho peke yake katika muundo wa \"Jibu:\". Usiongeze chochote kingine isipokuwa jibu la integer baada ya \"Jibu:\".\n{{question}}"
filter_list:
- filter:
  - function: regex
    regex_pattern: 'Jibu:\s*(\-?[0-9\.\,]+)'
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: '(\-?\d[\d.,]*)'
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Swali:'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_sw
