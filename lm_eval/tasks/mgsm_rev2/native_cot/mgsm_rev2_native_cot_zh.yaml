dataset_name: zh
doc_to_target: '{{answer_number|string}}'
doc_to_text: '{{"问题： "+question+"\n逐步解答:"}}'
filter_list:
- filter:
  - function: regex
    regex_pattern: 答案是 (\-?[0-9\.\,]+)。
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: (-?[$0-9.,]{2,})|(-?[0-9]+)
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 问题：
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_zh
