dataset_name: zh
doc_to_target: '{{answer_number|string}}'
doc_to_text: "{{question}}\n请逐步推理，并将最终答案放在 \\boxed{} 中。"
filter_list:
- filter:
  - function: regex
    regex_pattern: 答案是 (\-?[0-9\.\,]+)。
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: "\\\\boxed\\{(\\-?[0-9\\.,]+)\\}"
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 问题：
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_zh
