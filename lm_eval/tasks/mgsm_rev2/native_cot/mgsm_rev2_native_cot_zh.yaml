dataset_name: zh
doc_to_target: '{{answer_number|string}}'
doc_to_text: "解决这个数学问题。在最后一行给出答案前，请提供推理步骤。最后一行应该以\"答案：\"的形式独立给出答案。在\"答案：\"后不要添加除整数答案之外的任何内容。\n{{question}}"
filter_list:
- filter:
  - function: regex
    regex_pattern: '答案[：:]\s*(\-?[0-9\.\,]+)'
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: '(\-?[0-9\.\,]+)'
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 问题：
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_zh
