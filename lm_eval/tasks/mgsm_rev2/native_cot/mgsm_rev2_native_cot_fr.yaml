dataset_name: fr
doc_to_target: '{{answer_number|string}}'
doc_to_text: "Résolvez ce problème de mathématiques. Donnez les étapes de raisonnement avant de fournir la réponse finale sur la dernière ligne elle-même dans le format de \"Réponse:\". N'ajoutez rien d'autre que le nombre de la réponse après \"Réponse:\".\n{{question}}"
filter_list:
- filter:
  - function: regex
    regex_pattern: 'Réponse\s*:\s*(\-?[0-9\.\,]+)'
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: '(\-?\d[\d.,]*)'
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Question :'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_fr
