dataset_name: en
doc_to_target: '{{answer_number|string}}'
doc_to_text: "Solve this math problem. Give the reasoning steps before giving the final answer on the last line by itself in the format of \"Answer:\". Do not add anything other than the integer answer after \"Answer:\".\n{{question}}"
filter_list:
- filter:
  - function: regex
    regex_pattern: 'Answer:\s*(\-?[0-9\.\,]+)'
  - function: take_first
  name: strict-match
- filter:
  - function: regex
    group_select: -1
    regex_pattern: '(\-?[0-9\.\,]+)'
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Question:'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_en
